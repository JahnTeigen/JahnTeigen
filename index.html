<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        video { max-width: 100%; margin: 10px 0; }
        h1 { color: #333; }
        .video-item { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Video Gallery</h1>
    <div id="videoGallery">
        <!-- Videos will be dynamically listed here -->
    </div>

    <script>
        // Pre-uploaded videos in the 'videos' folder
        const videos = [
            { title: "Amazing Video 1", src: "videos/video1.mp4" },
            { title: "Awesome Video 2", src: "videos/video2.mp4" },
            { title: "Cool Video 3", src: "videos/video3.mp4" }
        ];

        const gallery = document.getElementById("videoGallery");

        // Loop through videos and create elements dynamically
        videos.forEach(video => {
            const videoContainer = document.createElement("div");
            videoContainer.className = "video-item";

            const videoTitle = document.createElement("h3");
            videoTitle.textContent = video.title;

            const videoElement = document.createElement("video");
            videoElement.src = video.src;
            videoElement.controls = true;

            videoContainer.appendChild(videoTitle);
            videoContainer.appendChild(videoElement);
            gallery.appendChild(videoContainer);
        });
    </script>
</body>
</html>
