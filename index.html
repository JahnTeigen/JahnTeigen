<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery with Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #333; }
        video { max-width: 100%; margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Video Gallery with Login</h1>

    <!-- Login Section -->
    <div id="loginSection">
        <h2>Login</h2>
        <input id="email" type="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
    </div>

    <!-- Video Gallery Section -->
    <div id="videoSection" class="hidden">
        <h2>Welcome, <span id="userEmail"></span>!</h2>
        <button onclick="logout()">Logout</button>
        <h2>Upload Video</h2>
        <input id="videoTitle" type="text" placeholder="Enter video title"><br>
        <input id="videoFile" type="file" accept="video/*"><br>
        <button onclick="uploadVideo()">Upload</button>

        <h2>Video List</h2>
        <div id="videoGallery"></div>
    </div>

    <script>
        // Initialize Supabase
const SUPABASE_URL = "https://phzpkiwozlbejnyuozmd.supabase.co";
const SUPABASE_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoenBraXdvemxiZWpueXVvem1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzMzOTc1MTAsImV4cCI6MjA0ODk3MzUxMH0.ykAh1PC8Q4x0j6r3OHOShb1UmtdVTWkuLU2FrmLN8SA";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_API_KEY);

let currentUser = null; // Ensure this variable is declared at the top

async function login() {
    try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (!email || !password) {
            alert("Please enter both email and password!");
            return;
        }

        // Query the database for matching user credentials
        const { data, error } = await supabase
            .from("Login")
            .select("*")
            .eq("email", email)
            .eq("password", password)
            .single(); // Ensure only one user is fetched

        if (error || !data) {
            console.error("Error during login:", error || "No user found");
            alert("Invalid email or password!");
            return;
        }

        // Successful login
        currentUser = data; // Assign the retrieved user data
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("videoSection").classList.remove("hidden");
        document.getElementById("userEmail").textContent = currentUser.email;

        loadVideos(); // Load videos after successful login
    } catch (err) {
        console.error("Unhandled error during login:", err);
        alert("Something went wrong during login. Please try again.");
    }
}


        // Logout Function
        function logout() {
            currentUser = null;
            document.getElementById("loginSection").classList.remove("hidden");
            document.getElementById("videoSection").classList.add("hidden");
        }

        // Simulating the "videos" folder
        const preloadedVideos = [
            "videos/video1.mp4",
            "videos/video2.mp4"
        ];

        function loadVideos() {
            const gallery = document.getElementById("videoGallery");
            gallery.innerHTML = "";

            // Combine preloaded videos with uploaded videos
            const uploadedVideos = JSON.parse(localStorage.getItem("uploadedVideos") || "[]");
            const allVideos = [...preloadedVideos, ...uploadedVideos];

            allVideos.forEach(src => {
                const videoContainer = document.createElement("div");

                const videoElement = document.createElement("video");
                videoElement.src = src;
                videoElement.controls = true;

                videoContainer.appendChild(videoElement);
                gallery.appendChild(videoContainer);
            });
        }

        function uploadVideo() {
            const fileInput = document.getElementById("videoFile");
            const videoTitle = document.getElementById("videoTitle").value;
            const file = fileInput.files[0];

            if (!file || !videoTitle) {
                alert("Please provide a video file and a title.");
                return;
            }

            // Convert file to a local URL
            const fileURL = URL.createObjectURL(file);

            // Save the uploaded video to localStorage
            const uploadedVideos = JSON.parse(localStorage.getItem("uploadedVideos") || "[]");
            uploadedVideos.push(fileURL);
            localStorage.setItem("uploadedVideos", JSON.stringify(uploadedVideos));

            fileInput.value = "";
            document.getElementById("videoTitle").value = "";
            alert("Video uploaded!");
            loadVideos();
        }
    </script>
</body>
</html>
